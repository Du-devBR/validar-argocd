apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-react
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-react
  template:
    metadata:
      labels:
        app: frontend-react
    spec:
      containers:
      - name: frontend
        image: 192.168.15.41/frontend/frontend:v1
        ports:
        - containerPort: 80
