apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-nginx
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-nginx
  template:
    metadata:
      labels:
        app: frontend-nginx
        app.kubernetes.io/instance: frontend-nginx
        app.kubernetes.io/version: v1
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: frontend-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: frontend
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Minha Página Nginx</title>
    </head>
    <body>
        <h1>Olá! Esta é minha página estática no Nginx</h1>
    </body>
    </html>
