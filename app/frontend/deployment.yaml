apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-react
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-react
  template:
    metadata:
      labels:
        app: frontend-react
        app.kubernetes.io/instance: frontend-react
        app.kubernetes.io/version: v1
    spec:
      imagePullSecrets:
      - name: harbor-secret
      containers:
      - name: frontend
        image: harbor.dev.pipebr/frontend/frontend:v2
        ports:
        - containerPort: 80
