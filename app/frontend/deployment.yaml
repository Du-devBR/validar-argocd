apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-nginx
  namespace: frontend
  labels:
    environment: dev
    team: infra
    owner: eduardo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-react
  template:
    metadata:
      labels:
        app: frontend-react
        version: v1
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
